version: "3.3"

services:
  web:
    build: .
    privileged: true
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: gestion_demandes
      DB_USER: app
      DB_PASS: app
      DB_PORT: 3306
      BASE_URL: /admin2
    depends_on:
      - db
    volumes:
      - ./uploads/demandes:/app/admin2/uploads/demandes

  db:
    build:
      context: .
      dockerfile: database/Dockerfile
    privileged: true
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: gestion_demandes
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
