services:
  web1:
    build: .
    environment:
      DB_HOST: db
      DB_NAME: gestion_demandes
      DB_USER: app
      DB_PASS: app
      DB_PORT: 3306
      BASE_URL: /admin2
    depends_on:
      - db
    volumes:
      - ./uploads/demandes:/var/www/html/admin2/uploads/demandes
      - php_sessions:/var/lib/php/sessions

  web2:
    build: .
    environment:
      DB_HOST: db
      DB_NAME: gestion_demandes
      DB_USER: app
      DB_PASS: app
      DB_PORT: 3306
      BASE_URL: /admin2
    depends_on:
      - db
    volumes:
      - ./uploads/demandes:/var/www/html/admin2/uploads/demandes
      - php_sessions:/var/lib/php/sessions

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - web1
      - web2
    ports:
      - "8080:80"
    volumes:
      - ./nginx/ha.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: gestion_demandes
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./database/unified_database.sql:/docker-entrypoint-initdb.d/01_unified_database.sql:ro

volumes:
  db_data:
  php_sessions:
